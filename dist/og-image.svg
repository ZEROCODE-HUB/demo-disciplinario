<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12211E"/>
      <stop offset="100%" stop-color="#1A2F2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A6D3B"/>
      <stop offset="100%" stop-color="#6B5229"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#8A6D3B" stroke-width="1" opacity="0.35" rx="4"/>

  <!-- Left accent bar -->
  <rect x="64" y="180" width="4" height="120" rx="2" fill="url(#accent)"/>

  <!-- Decorative horizontal lines -->
  <line x1="88" y1="200" x2="400" y2="200" stroke="#8A6D3B" stroke-width="0.5" opacity="0.2"/>
  <line x1="88" y1="280" x2="300" y2="280" stroke="#8A6D3B" stroke-width="0.5" opacity="0.2"/>

  <!-- Decorative geometric element -->
  <rect x="960" y="80" width="160" height="160" rx="80" fill="none" stroke="#8A6D3B" stroke-width="0.5" opacity="0.12"/>
  <rect x="990" y="110" width="100" height="100" rx="50" fill="none" stroke="#8A6D3B" stroke-width="0.5" opacity="0.12"/>
  <rect x="1010" y="130" width="60" height="60" rx="30" fill="#8A6D3B" opacity="0.08"/>

  <!-- Building icon (simplified) -->
  <g transform="translate(85, 360)" opacity="0.2" fill="#8A6D3B">
    <rect x="0" y="20" width="50" height="65" rx="2"/>
    <rect x="6" y="26" width="12" height="14" rx="1.5"/>
    <rect x="22" y="26" width="12" height="14" rx="1.5"/>
    <rect x="38" y="26" width="9" height="14" rx="1.5"/>
    <rect x="6" y="43" width="12" height="14" rx="1.5"/>
    <rect x="22" y="43" width="12" height="14" rx="1.5"/>
    <rect x="38" y="43" width="9" height="14" rx="1.5"/>
    <rect x="6" y="60" width="12" height="14" rx="1.5"/>
    <rect x="22" y="60" width="12" height="14" rx="1.5"/>
    <rect x="38" y="60" width="9" height="14" rx="1.5"/>
    <rect x="17" y="0" width="16" height="22" rx="1.5"/>
  </g>

  <!-- Title -->
  <text x="88" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="600" fill="#EEF1EC">
    Gestión
  </text>
  <text x="88" y="296" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="600" fill="#EEF1EC">
    Disciplinaria
  </text>

  <!-- Subtitle -->
  <text x="88" y="340" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#8A6D3B" letter-spacing="3">
    DEMO — RETAIL GROUP S.A.
  </text>

  <!-- Bottom decorative bar -->
  <rect x="64" y="490" width="280" height="1" fill="#8A6D3B" opacity="0.25"/>

  <!-- Status line -->
  <text x="64" y="520" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5B6660" letter-spacing="1.5">
    SISTEMA DE GESTIÓN DISCIPLINARIA CON IA
  </text>

  <!-- Right side decorative element -->
  <g transform="translate(1020, 380)" opacity="0.06">
    <rect x="0" y="0" width="120" height="100" rx="3" fill="none" stroke="#EEF1EC" stroke-width="1"/>
    <rect x="10" y="12" width="100" height="20" rx="2" fill="#EEF1EC"/>
    <rect x="10" y="40" width="65" height="8" rx="2" fill="#EEF1EC"/>
    <rect x="10" y="54" width="80" height="8" rx="2" fill="#EEF1EC"/>
    <rect x="10" y="68" width="45" height="8" rx="2" fill="#EEF1EC"/>
  </g>
</svg>
